name: Annual Report Watcher

# Triggers:
#   - hourly cron at minute :17 UTC (= :47 IST) — primary scheduler (lossy on GitHub free tier)
#   - manual via the Actions tab (workflow_dispatch) — for ad-hoc / catch-up runs
#   - push to this file — auto-bootstraps a run when the workflow itself changes
#     (also handy as a manual trigger when the Actions "Run workflow" button isn't accessible)

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/watcher.yml']

permissions:
  contents: write
  issues: write

concurrency:
  group: annual-report-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests==2.34.2

      - name: Run watcher
        id: run
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python annual_report_watcher.py 2>&1 | tee last_run.log
          ec=${PIPESTATUS[0]}
          echo "exit_code=$ec" | tee -a last_run.log

      - name: Dump log to step summary
        if: always()
        run: |
          {
            echo "## Watcher run log"
            echo
            echo '```'
            cat last_run.log 2>/dev/null || echo "(no log file produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watcher-log
          path: last_run.log
          if-no-files-found: warn

      - name: Create debug issue with log
        if: steps.run.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          try:
              log = open("last_run.log").read()
          except FileNotFoundError:
              log = "(no log file produced)"
          body = (
              f"Run: {os.environ['RUN_URL']}\n\n"
              "```\n" + log[-6000:] + "\n```\n"
          )
          payload = json.dumps({"title": "Watcher run log", "body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print("issue created:", resp.status)
          except Exception as e:
              print("issue create failed:", e)
          PY

      - name: Record run heartbeat
        if: always()
        run: |
          mkdir -p .heartbeat
          TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST run=${{ github.run_id }}" > .heartbeat/last_run.txt

      - name: Commit seen.json and heartbeat
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A seen.json bse500.json .heartbeat 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Heartbeat + seen.json update [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push && break
              sleep $((2 ** i))
            done
          fi

      - name: Fail job if watcher errored
        if: always()
        run: |
          ec=$(grep -oE 'exit_code=[0-9]+' last_run.log | tail -1 | cut -d= -f2)
          echo "Watcher exit code: $ec"
          [ "$ec" = "0" ] || exit 1
