name: Annual Report Watcher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: annual-report-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run watcher
        id: run
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python annual_report_watcher.py 2>&1 | tee last_run.log
          echo "exit_code=${PIPESTATUS[0]}" | tee -a last_run.log

      - name: Commit run artifacts
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A seen.json last_run.log 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update run artifacts [skip ci]"
            git push
          fi

      - name: Surface watcher exit code
        if: always()
        run: |
          ec=$(grep -oE 'exit_code=[0-9]+' last_run.log | tail -1 | cut -d= -f2)
          echo "Watcher exit code: $ec"
          [ "$ec" = "0" ] || exit 1
