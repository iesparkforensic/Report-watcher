name: Daily Email Report

# Sends the bifurcated Excel report by email every day at 17:22 IST (11:52 UTC).
# Requires repo secrets: GMAIL_ADDRESS, GMAIL_APP_PASSWORD, REPORT_EMAIL_TO.

on:
  schedule:
    - cron: '52 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-email-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Build and email report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        run: python daily_report.py

      - name: Persist reported high-water mark
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reported.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update daily-report high-water mark [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push && break
              sleep $((2 ** i))
            done
          fi
