name: Daily Email Report

# Sends the bifurcated Excel report by email every day at 17:22 IST (11:52 UTC).
# Requires repo secrets: GMAIL_ADDRESS, GMAIL_APP_PASSWORD, REPORT_EMAIL_TO.

on:
  schedule:
    - cron: '52 11 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-email-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Build and email report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        run: python daily_report.py
